<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fruit Frenzy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: sans-serif;
      overflow: hidden;
      /* Prevent scrollbars from animations */
      touch-action: none;
      /* Prevent browser gestures on mobile */
    }

    .font-lilita {
      font-family: 'Lilita One', cursive;
    }

    /* Button Styles */
    .btn {
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
      border-width: 2px;
      border-bottom-width: 6px;
      transition: all 0.1s ease-in-out;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-3px);
      border-bottom-width: 8px;
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(2px);
      border-bottom-width: 4px;
    }

    .btn:disabled {
      transform: translateY(0);
      filter: saturate(0.5) brightness(0.7);
      cursor: not-allowed;
      border-bottom-width: 6px;
    }

    .btn-green {
      background: linear-gradient(to bottom, #4ade80, #16a34a);
      border-color: #15803d;
    }

    .btn-cyan {
      background: linear-gradient(to bottom, #22d3ee, #0891b2);
      border-color: #0e7490;
    }

    .btn-purple {
      background: linear-gradient(to bottom, #a855f7, #7e22ce);
      border-color: #6b21a8;
    }

    .btn-blue {
      background: linear-gradient(to bottom, #60a5fa, #2563eb);
      border-color: #1d4ed8;
    }

    .btn-orange {
      background: linear-gradient(to bottom, #f97316, #ea580c);
      border-color: #c2410c;
    }

    .btn-wood {
      background: linear-gradient(to bottom, #854d0e, #5c3a18);
      border-color: #3f260e;
      color: #fcd34d;
    }

    /* Animations */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        filter: brightness(1) drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      }

      50% {
        filter: brightness(1.1) drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
      }
    }

    .animate-pulse-glow {
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-once {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.3);
        color: #fef08a;
      }

      100% {
        transform: scale(1);
      }
    }

    .animate-pulse-once {
      animation: pulse-once 0.3s ease-out;
    }

    @keyframes subtle-pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .animate-subtle-pulse {
      animation: subtle-pulse 2s ease-in-out infinite;
    }

    @keyframes logo-alive {

      0%,
      100% {
        transform: scale(1) rotate(0deg);
      }

      25% {
        transform: scale(1.02) rotate(-1deg);
      }

      50% {
        transform: scale(1.03) rotate(0deg);
      }

      75% {
        transform: scale(1.02) rotate(1deg);
      }
    }

    .animate-logo-alive {
      animation: logo-alive 5s ease-in-out infinite;
    }

    @keyframes bounce-slow {

      0%,
      100% {
        transform: translateY(-5%);
        animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
      }

      50% {
        transform: translateY(0);
        animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
      }
    }

    .animate-bounce-slow {
      animation: bounce-slow 2s infinite;
    }
  </style>
